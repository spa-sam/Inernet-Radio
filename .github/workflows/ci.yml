name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------------
  # Lint: formatting check + Clippy on Linux (fast, no Windows runner
  # needed for platform-independent Rust checks).
  # ------------------------------------------------------------------
  lint:
    name: Clippy & fmt
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Install system libraries Tauri needs when cross-compiling on Linux
      - name: Install Tauri system dependencies (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      # Run the unit tests for the pure parsers/helpers (parse_url,
      # resolve_location, is_playlist, sanitize_filename, segment_path, …).
      - name: cargo test
        working-directory: src-tauri
        run: cargo test --all-features

  # ------------------------------------------------------------------
  # Lint the vanilla-JS frontend with ESLint.
  # ------------------------------------------------------------------
  lint-js:
    name: ESLint (frontend)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  # ------------------------------------------------------------------
  # Windows build: compile a release binary to ensure it links on the
  # actual target platform (no installer; just the binary).
  # ------------------------------------------------------------------
  build-windows:
    name: Windows release build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            src-tauri\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build --release
        working-directory: src-tauri
        run: cargo build --release
