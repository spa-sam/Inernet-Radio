<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Radio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="app-container">
        <div class="tabs">
            <button class="tab active" data-tab="radio">Radio</button>
            <button class="tab" data-tab="custom">Custom</button>
            <button class="tab" data-tab="settings">Settings</button>
        </div>

        <div class="tab-content active" id="tab-radio">
            <div class="player-section">
                <div class="player-main">
                    <div class="player-left">
                        <img id="station-logo" src="" alt="" class="station-logo hidden">
                        <div class="player-controls">
                            <button id="prev-btn" class="nav-btn" title="Previous">⏮</button>
                            <button id="play-btn" class="play-btn" disabled>
                                <span class="play-icon">▶</span>
                            </button>
                            <button id="next-btn" class="nav-btn" title="Next">⏭</button>
                        </div>
                    </div>
                    <div class="player-center">
                        <div class="station-name-row">
                            <span id="station-name">Select a station</span>
                        </div>
                        <div id="now-playing-track" class="now-playing-track"></div>
                        <div class="station-meta">
                            <span id="meta-genre" class="meta-item hidden"></span>
                            <span id="meta-bitrate" class="meta-item hidden"></span>
                            <span id="meta-codec" class="meta-item hidden"></span>
                            <span id="meta-country" class="meta-item hidden"></span>
                        </div>
                        <canvas id="visualizer" class="visualizer"></canvas>
                    </div>
                    <div class="volume-vertical">
                        <button id="volume-up" class="volume-btn">+</button>
                        <div id="volume-sections" class="volume-sections"></div>
                        <button id="volume-down" class="volume-btn">−</button>
                        <input type="range" id="volume" min="0" max="100" value="70" style="display:none">
                    </div>
                </div>
            </div>

            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search stations...">
                    <button id="search-btn">Search</button>
                </div>
                <div class="presets">
                    <button class="preset-btn preset-favorites" data-genre="favorites">★ Favorites</button>
                    <button class="preset-btn" data-genre="pop">Pop</button>
                    <button class="preset-btn" data-genre="rock">Rock</button>
                    <button class="preset-btn" data-genre="rap">Rap</button>
                    <button class="preset-btn" data-genre="ambient">Ambient</button>
                    <button class="preset-btn" data-genre="chill">Chill</button>
                    <button class="preset-btn" data-genre="classical">Classic</button>
                </div>
            </div>

            <div class="stations-section">
                <div id="stations-list" class="stations-list">
                    <div class="loading-hint">Search for radio stations above</div>
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-custom">
            <div class="custom-section">
                <h3>Add Custom Station</h3>
                <div class="custom-form">
                    <input type="text" id="custom-name" placeholder="Station name">
                    <input type="text" id="custom-url" placeholder="Stream URL (http://...)">
                    <input type="text" id="custom-genre" placeholder="Genre (optional)">
                    <button id="add-custom-btn">Add Station</button>
                </div>
                <h3>Custom Stations</h3>
                <div id="custom-stations-list" class="stations-list">
                    <div class="loading-hint">No custom stations yet</div>
                </div>
            </div>
            <div class="export-section">
                <h3>Import / Export</h3>
                <div class="export-buttons">
                    <button id="export-favorites-btn">Export Favorites</button>
                    <button id="export-custom-btn">Export Custom</button>
                    <button id="import-btn">Import Stations</button>
                    <input type="file" id="import-file" accept=".json" style="display:none">
                </div>
            </div>
        </div>

        <div class="tab-content" id="tab-settings">
            <div class="settings-section">
                <h3>Display</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="compact-mode">
                        Compact Mode
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="visualizer-enabled" checked>
                        Audio Visualizer
                    </label>
                </div>
                <div class="setting-item color-picker-item">
                    <label for="visualizer-color">Visualizer Color</label>
                    <input type="color" id="visualizer-color" value="#00b894">
                </div>
                <h3>About</h3>
                <p class="about-text">Internet Radio Player v1.0<br>Built with Tauri + Rust</p>
            </div>
        </div>

        <audio id="audio-player" crossorigin="anonymous"></audio>
    </div>
    <script src="main.js"></script>
</body>
</html>
